name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

# One preview deployment per PR at a time; cancel in-flight builds when new
# commits arrive.
concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Build and deploy a preview when a PR is opened or updated
  # -------------------------------------------------------------------------
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Post "building" comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-preview
          message: |
            ## 🔄 Site Preview

            A preview is being built for this PR. Check back in a minute.

            > Triggered by commit ${{ github.event.pull_request.head.sha }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Normalize preview vars
        id: preview_vars
        env:
          JEKYLL_URL: ${{ vars.JEKYLL_URL }}
          JEKYLL_BASEURL: ${{ vars.JEKYLL_BASEURL }}
        run: |
          URL="${JEKYLL_URL:-https://jci-metasys.github.io}"
          BASE="${JEKYLL_BASEURL:-/api-landing}"
          URL="${URL%/}"                             # strip trailing slash
          BASE="${BASE%/}"                           # strip trailing slash
          [[ -n "${BASE}" && "${BASE}" != /* ]] && BASE="/${BASE}"   # ensure leading slash (guard empty)
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "baseurl=${BASE}" >> "$GITHUB_OUTPUT"
          echo "preview_url=${URL}${BASE}/pr-preview/pr-${{ github.event.pull_request.number }}/" >> "$GITHUB_OUTPUT"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1.3"
          bundler-cache: true

      - name: Write preview config override
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          cat > _config-preview.yml <<EOF
          url: "${{ steps.preview_vars.outputs.url }}"
          baseurl: "${{ steps.preview_vars.outputs.baseurl }}/pr-preview/pr-${PR_NUMBER}/"
          EOF

      - name: Build site
        run: bundle exec jekyll build --config _config.yml,_config-preview.yml

      - name: Write build sentinel
        run: echo "${{ github.event.pull_request.head.sha }}" > _site/_build_sha.txt

      - name: Fix extension-less links for static preview hosting
        # GitHub Pages handles extension-less URLs via content negotiation, but
        # the static preview directory does not. This shim catches clicks on
        # known API page links (e.g. /api/v6) and appends .html, and adds
        # index.html to bare directory links.
        #
        # NOTE: Update the version list here whenever a new API version file is
        # added to api/ (e.g. add 'v6-16' when api/v6-16.html is created).
        run: |
          if [ ! -f "_site/assets/js/main.js" ]; then
            echo "Error: _site/assets/js/main.js not found — cannot append preview shim"
            exit 1
          fi
          cat >> _site/assets/js/main.js <<'JSEOF'

          $('a').on('click', function(e) {
              const current = e.originalEvent.currentTarget.href;
              const urlParts = current.split('/');
              if (urlParts.length < 2) return;

              const last = urlParts[urlParts.length - 1];
              if (last == 'v4' || last == 'v5' || last == 'v6' || last == 'v6-14-1' || last == 'v6-15') {
                e.originalEvent.currentTarget.href = current + ".html";
                return;
              }
              if (last === '' || last.indexOf('.') === -1) {
                  e.originalEvent.currentTarget.href = current + (last === '' ? '' : '/') + 'index.html';
              }
          });
          JSEOF

      - name: Deploy preview to gh-pages branch
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone --branch gh-pages --single-branch \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            gh-pages-checkout

          cd gh-pages-checkout
          rm -rf "pr-preview/pr-${PR_NUMBER}"
          mkdir -p "pr-preview/pr-${PR_NUMBER}"
          cp -r ../_site/. "pr-preview/pr-${PR_NUMBER}/"

          git add "pr-preview/pr-${PR_NUMBER}"
          git commit -m "chore: deploy preview for PR #${PR_NUMBER}"
          git push

      - name: Update comment — waiting for deployment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-preview
          message: |
            ## ⏳ Deploying Site Preview

            Build complete — waiting for GitHub Pages to finish deploying...

            > Built from commit ${{ github.event.pull_request.head.sha }}

      - name: Wait for GitHub Pages deployment
        run: |
          EXPECTED_SHA="${{ github.event.pull_request.head.sha }}"
          SENTINEL_URL="${{ steps.preview_vars.outputs.preview_url }}_build_sha.txt"
          echo "Waiting for sentinel at $SENTINEL_URL to contain $EXPECTED_SHA..."
          for i in $(seq 1 24); do
            DEPLOYED_SHA=$(curl -sf "$SENTINEL_URL" | tr -d '[:space:]' || echo "not_found")
            echo "  attempt $i/24: got '$DEPLOYED_SHA'"
            if [[ "$DEPLOYED_SHA" == "$EXPECTED_SHA" ]]; then
              echo "Correct build is live."
              exit 0
            fi
            sleep 10
          done
          echo "Error: preview did not serve the expected build after 240 seconds"
          exit 1

      - name: Update comment with preview URL
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-preview
          message: |
            ## ✅ Site Preview Ready

            **[Open Preview →](${{ steps.preview_vars.outputs.preview_url }})**

            > Built from commit ${{ github.event.pull_request.head.sha }}

  # -------------------------------------------------------------------------
  # Clean up the preview when the PR is closed or merged
  # -------------------------------------------------------------------------
  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Wait for any in-flight deployments to settle
        run: sleep 15

      - name: Remove preview directory from gh-pages branch
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone only the gh-pages branch (shallow, no blobs we don't need)
          git clone --branch gh-pages --single-branch \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            gh-pages-checkout

          cd gh-pages-checkout

          if [ -d "pr-preview/pr-${PR_NUMBER}" ]; then
            git rm -rf "pr-preview/pr-${PR_NUMBER}"
            git commit -m "chore: remove PR #${PR_NUMBER} preview"
            git push
          else
            echo "No preview directory found for PR #${PR_NUMBER}, nothing to clean up."
          fi

      - name: Update comment to reflect removal
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-preview
          message: |
            ## 🗑️ Site Preview Removed

            The preview for this PR has been cleaned up.

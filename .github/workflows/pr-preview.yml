name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

# One preview deployment per PR at a time; cancel in-flight builds when new
# commits arrive.
concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Build and deploy a preview when a PR is opened or updated
  # -------------------------------------------------------------------------
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Post "building" comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview
          message: |
            ## 🔄 Site Preview

            A preview is being built for this PR. Check back in a minute.

            > Triggered by commit ${{ github.event.pull_request.head.sha }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1.3"
          bundler-cache: true

      - name: Write preview config override
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          cat > _config-preview.yml <<EOF
          url: "https://jci-metasys.github.io"
          baseurl: "/api-landing/pr-preview/pr-${PR_NUMBER}/"
          EOF

      - name: Build site
        run: bundle exec jekyll build --config _config.yml,_config-preview.yml

      - name: Fix extension-less links for static preview hosting
        # GitHub Pages handles extension-less URLs via content negotiation, but
        # the static preview directory does not. This shim catches clicks on
        # known API page links (e.g. /api/v6) and appends .html, and adds
        # index.html to bare directory links.
        #
        # NOTE: Update the version list here whenever a new API version file is
        # added to api/ (e.g. add 'v6-16' when api/v6-16.html is created).
        run: |
          cat >> _site/assets/js/main.js <<'JSEOF'

          $('a').on('click', function(e) {
              const current = e.originalEvent.currentTarget.href;
              const urlParts = current.split('/');
              if (urlParts.length < 2) return;

              const last = urlParts[urlParts.length - 1];
              if (last == 'v4' || last == 'v5' || last == 'v6' || last == 'v6-14-1' || last == 'v6-15') {
                e.originalEvent.currentTarget.href = current + ".html";
                return;
              }
              if (last === '' || last.indexOf('.') === -1) {
                  e.originalEvent.currentTarget.href = current + (last === '' ? '' : '/') + 'index.html';
              }
          });
          JSEOF

      - name: Deploy preview to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          destination_dir: pr-preview/pr-${{ github.event.pull_request.number }}
          # keep_files: true leaves other PR previews and the main site intact.
          keep_files: true

      - name: Update comment with preview URL
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview
          message: |
            ## ✅ Site Preview Ready

            **[Open Preview →](https://jci-metasys.github.io/api-landing/pr-preview/pr-${{ github.event.pull_request.number }}/)**

            > Built from commit ${{ github.event.pull_request.head.sha }}

  # -------------------------------------------------------------------------
  # Clean up the preview when the PR is closed or merged
  # -------------------------------------------------------------------------
  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Remove preview directory from gh-pages branch
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone only the gh-pages branch (shallow, no blobs we don't need)
          git clone --branch gh-pages --single-branch \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            gh-pages-checkout

          cd gh-pages-checkout

          if [ -d "pr-preview/pr-${PR_NUMBER}" ]; then
            git rm -rf "pr-preview/pr-${PR_NUMBER}"
            git commit -m "chore: remove PR #${PR_NUMBER} preview"
            git push
          else
            echo "No preview directory found for PR #${PR_NUMBER}, nothing to clean up."
          fi

      - name: Update comment to reflect removal
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview
          message: |
            ## 🗑️ Site Preview Removed

            The preview for this PR has been cleaned up.

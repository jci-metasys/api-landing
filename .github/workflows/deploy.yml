name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Allow only one deployment at a time; cancel in-flight runs.
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Normalize deploy vars
        id: deploy_vars
        env:
          JEKYLL_URL: ${{ vars.JEKYLL_URL }}
          JEKYLL_BASEURL: ${{ vars.JEKYLL_BASEURL }}
        run: |
          URL="${JEKYLL_URL:-https://jci-metasys.github.io}"
          BASE="${JEKYLL_BASEURL:-/api-landing}"
          URL="${URL%/}"
          BASE="${BASE%/}"
          [[ -n "${BASE}" && "${BASE}" != /* ]] && BASE="/${BASE}"   # ensure leading slash
          [[ -n "${BASE}" ]] && BASE="${BASE}/"                       # restore trailing slash for Liquid prepend
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "baseurl=${BASE}" >> "$GITHUB_OUTPUT"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1.3"
          bundler-cache: true

      - name: Build site
        run: |
          cat > _config-deploy.yml <<EOF
          url: "${{ steps.deploy_vars.outputs.url }}"
          baseurl: "${{ steps.deploy_vars.outputs.baseurl }}"
          EOF
          bundle exec jekyll build --config _config.yml,_config-deploy.yml

      - name: Deploy to gh-pages branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone --branch gh-pages --single-branch \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            gh-pages-checkout

          cd gh-pages-checkout
          # .nojekyll prevents GitHub Pages from re-running Jekyll on built output
          touch .nojekyll
          # Copy new site over existing files; pr-preview/ is preserved since it
          # is not in _site/ and cp does not delete files we aren't copying.
          cp -r ../_site/. ./
          git add .
          git diff --cached --quiet || git commit -m "chore: deploy site from ${{ github.sha }}"
          git push

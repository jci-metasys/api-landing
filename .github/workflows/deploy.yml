name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Allow only one deployment at a time; cancel in-flight runs.
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Normalize deploy vars
        id: deploy_vars
        env:
          JEKYLL_URL: ${{ vars.JEKYLL_URL }}
          JEKYLL_BASEURL: ${{ vars.JEKYLL_BASEURL }}
        run: |
          URL="${JEKYLL_URL:-https://jci-metasys.github.io}"
          BASE="${JEKYLL_BASEURL:-/api-landing}"
          URL="${URL%/}"
          BASE="${BASE%/}"
          [[ -n "${BASE}" && "${BASE}" != /* ]] && BASE="/${BASE}"   # ensure leading slash
          [[ -n "${BASE}" ]] && BASE="${BASE}/"                       # restore trailing slash for Liquid prepend
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "baseurl=${BASE}" >> "$GITHUB_OUTPUT"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1.3"
          bundler-cache: true

      - name: Build site
        run: |
          cat > _config-deploy.yml <<EOF
          url: "${{ steps.deploy_vars.outputs.url }}"
          baseurl: "${{ steps.deploy_vars.outputs.baseurl }}"
          EOF
          bundle exec jekyll build --config _config.yml,_config-deploy.yml

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          # keep_files: true preserves pr-preview/ subdirectories so active
          # PR previews aren't wiped on every main-branch deployment.
          keep_files: true
